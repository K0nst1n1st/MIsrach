<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Misrach – Kompass zur Klagemauer</title>

<!-- Homescreen / "App"-Verhalten -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Misrach">
<meta name="theme-color" content="#0E1B2E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230E1B2E'/%3E%3Ccircle cx='50' cy='50' r='34' fill='none' stroke='%23C9A227' stroke-width='4'/%3E%3Cpath d='M50 22 L57 50 L50 78 L43 50 Z' fill='%23C9A227'/%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700&family=Heebo:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --night:#0E1B2E;        /* Techelet-Nacht */
    --panel:#132440;
    --stone:#EAE0CB;        /* Jerusalemer Stein */
    --stone-dim:#9DA8B8;
    --gold:#C9A227;
    --gold-soft:#E3C766;
    --ring: rgba(201,162,39,.35);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background: radial-gradient(120% 90% at 50% 0%, #16294A 0%, var(--night) 55%, #0A1424 100%);
    color:var(--stone);
    font-family:'Heebo',system-ui,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    min-height:100dvh;
    padding: max(env(safe-area-inset-top), 18px) 20px calc(env(safe-area-inset-bottom) + 24px);
    overflow:hidden;
    user-select:none;
  }

  header{ text-align:center; margin-top:6px }
  .eyebrow{
    font-size:11px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--stone-dim); font-weight:400;
  }
  h1{
    font-family:'Frank Ruhl Libre',serif; font-weight:500;
    font-size:clamp(26px,7vw,34px); margin-top:6px; color:var(--stone);
  }
  h1 .he{ color:var(--gold-soft); font-weight:700 }

  /* ---------- Kompass ---------- */
  .stage{
    position:relative; flex:1; width:100%;
    display:flex; align-items:center; justify-content:center;
    min-height:0;
  }
  .compass{
    position:relative;
    width:min(78vw, 46dvh, 340px);
    aspect-ratio:1;
  }
  .rose{
    position:absolute; inset:0;
    will-change: transform;
  }
  .rose svg{ width:100%; height:100% ; display:block}

  .needle{
    position:absolute; inset:0;
    will-change: transform;
    filter: drop-shadow(0 0 6px rgba(201,162,39,.45));
  }
  .needle svg{ width:100%; height:100%; display:block }

  .hub{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:14%; aspect-ratio:1; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, #1E3358, var(--panel) 70%);
    border:1.5px solid var(--ring);
    display:flex; align-items:center; justify-content:center;
    font-family:'Frank Ruhl Libre',serif; font-weight:700;
    color:var(--gold-soft); font-size:clamp(13px,3.4vw,17px);
  }

  .compass.aligned .needle{ filter: drop-shadow(0 0 16px rgba(227,199,102,.95)) }
  .compass.aligned::after{
    content:""; position:absolute; inset:-6%;
    border-radius:50%;
    border:1.5px solid var(--gold-soft);
    opacity:.7; animation: pulse 1.6s ease-out infinite;
  }
  .compass.aligned::before{
    content:""; position:absolute; inset:-12%;
    border-radius:50%;
    border:1px solid rgba(227,199,102,.5);
    opacity:.5; animation: pulse 1.6s .4s ease-out infinite;
  }
  @keyframes pulse{ 0%{transform:scale(.97);opacity:.7} 100%{transform:scale(1.1);opacity:0} }

  /* Strahlenkranz beim Einrasten */
  .burst{ position:absolute; inset:0; pointer-events:none }
  .burst i{
    position:absolute; left:calc(50% - 1px); top:50%;
    width:2px; height:30%;
    background:linear-gradient(0deg, transparent, var(--gold-soft));
    transform-origin:50% 0;
    opacity:0;
  }
  .compass.aligned .burst i{ animation: ray 1.1s ease-out forwards }
  @keyframes ray{
    0%   { opacity:0; transform: rotate(var(--a)) translateY(-58%) scaleY(.2) }
    25%  { opacity:.95 }
    100% { opacity:0; transform: rotate(var(--a)) translateY(-125%) scaleY(1) }
  }

  /* ---------- Münzwurf ---------- */
  .coinPanel{
    position:fixed; inset:0; z-index:50;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:28px; text-align:center;
    background:rgba(8,16,30,.86);
    -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
  }
  .coinPanel.show{ display:flex; animation: fadeIn .5s ease }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .coinPanel h2{
    font-family:'Frank Ruhl Libre',serif; font-weight:500;
    font-size:clamp(20px,5.5vw,26px); color:var(--stone);
  }
  .coinPanel .sub{ font-size:14px; color:var(--stone-dim); font-weight:300; max-width:300px }
  .coin{ width:min(44vw,170px); aspect-ratio:1; perspective:900px }
  .coinInner{
    width:100%; height:100%; position:relative;
    transform-style:preserve-3d;
  }
  .face{
    position:absolute; inset:0; border-radius:50%;
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    font-family:'Frank Ruhl Libre',serif; color:#4A3A0D;
    background:radial-gradient(circle at 35% 28%, #F0DA8C, #C9A227 62%, #8F701A);
    border:5px solid #8A6D1C;
    box-shadow:0 8px 30px rgba(0,0,0,.5), inset 0 0 0 3px rgba(255,240,190,.35);
  }
  .face .big{ font-size:clamp(40px,12vw,56px); font-weight:700; line-height:1 }
  .face .small{ font-size:13px; letter-spacing:.12em; margin-top:4px }
  .face.back{ transform:rotateX(180deg) }
  .choices{ display:flex; gap:14px }
  .choices button, .coinPanel .again{
    font-family:'Heebo',sans-serif; font-weight:600; font-size:15px;
    padding:12px 26px; border-radius:999px; cursor:pointer;
    border:1.5px solid var(--ring); background:rgba(19,36,64,.9); color:var(--stone);
  }
  .choices button:active{ background:var(--gold); color:var(--night) }
  .coinPanel .again{ border-color:transparent; background:linear-gradient(180deg,var(--gold-soft),var(--gold)); color:var(--night) }
  .coinPanel .close{
    position:absolute; top:calc(env(safe-area-inset-top) + 14px); right:18px;
    background:none; border:none; color:var(--stone-dim); font-size:26px; cursor:pointer; padding:8px;
  }
  .verdict{
    min-height:54px;
    font-family:'Frank Ruhl Libre',serif; font-size:clamp(18px,5vw,23px);
  }
  .verdict .yes{ color:var(--gold-soft) }
  .verdict .no{ color:var(--stone-dim) }

  @media (prefers-reduced-motion: reduce){
    .compass.aligned::after, .compass.aligned::before, .burst i{ animation:none }
  }

  /* ---------- Infozeile ---------- */
  .facts{
    width:100%; max-width:360px;
    display:grid; grid-template-columns:1fr 1px 1fr;
    align-items:center; gap:0 18px;
    background:linear-gradient(180deg, rgba(19,36,64,.85), rgba(14,27,46,.85));
    border:1px solid rgba(201,162,39,.22);
    border-radius:16px; padding:16px 18px;
  }
  .facts .div{ background:rgba(201,162,39,.25); height:70%; }
  .fact{ text-align:center }
  .fact .val{
    font-family:'Frank Ruhl Libre',serif; font-weight:500;
    font-size:clamp(24px,7vw,32px); color:var(--stone);
    font-variant-numeric: tabular-nums;
  }
  .fact .val em{ font-style:normal; color:var(--gold-soft) }
  .fact .lbl{ font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--stone-dim); margin-top:2px }

  .status{
    margin-top:12px; min-height:20px; text-align:center;
    font-size:13px; color:var(--stone-dim); font-weight:300;
  }
  .status.gold{ color:var(--gold-soft) }

  button.start{
    margin-top:14px;
    font-family:'Heebo',sans-serif; font-weight:600; font-size:15px;
    color:var(--night); background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    border:none; border-radius:999px; padding:13px 30px;
    cursor:pointer;
  }
  button.start:focus-visible{ outline:2px solid var(--stone); outline-offset:3px }
  .hidden{ display:none }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Digitaler Misrach</div>
  <h1><span class="he">מזרח</span> · Zur Klagemauer</h1>
</header>

<div class="stage">
  <div class="compass" id="compass">
    <!-- Rose (dreht sich mit dem Gerät, N bleibt echt) -->
    <div class="rose" id="rose">
      <svg viewBox="0 0 200 200" aria-hidden="true">
        <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(201,162,39,.30)" stroke-width="1.5"/>
        <circle cx="100" cy="100" r="78" fill="none" stroke="rgba(234,224,203,.12)" stroke-width="1"/>
        <g id="ticks" stroke="rgba(234,224,203,.45)"></g>
        <g font-family="Frank Ruhl Libre, serif" font-size="13" fill="#EAE0CB" text-anchor="middle">
          <text x="100" y="26" fill="#E3C766" font-weight="700">N</text>
          <text x="178" y="105">O</text>
          <text x="100" y="184">S</text>
          <text x="22" y="105">W</text>
        </g>
      </svg>
    </div>

    <!-- Nadel: zeigt zur Klagemauer -->
    <div class="needle" id="needle">
      <svg viewBox="0 0 200 200" aria-hidden="true">
        <path d="M100 10 L108 96 L100 112 L92 96 Z" fill="#C9A227"/>
        <path d="M100 10 L104 96 L100 108 Z" fill="#E3C766"/>
        <path d="M100 190 L104 124 L100 116 L96 124 Z" fill="rgba(234,224,203,.25)"/>
      </svg>
    </div>

    <div class="hub" aria-hidden="true">ם</div>
    <div class="burst" id="burst" aria-hidden="true"></div>
  </div>
</div>

<!-- Münzwurf -->
<div class="coinPanel" id="coinPanel" role="dialog" aria-label="Münzwurf">
  <button class="close" id="coinClose" aria-label="Schließen">×</button>
  <h2 id="coinTitle">Ausgerichtet zur Kotel</h2>
  <div class="sub" id="coinSub">Stell deine Frage im Stillen – wird es sich erfüllen? Wähle Kopf oder Zahl.</div>
  <div class="coin">
    <div class="coinInner" id="coinInner">
      <div class="face front"><div class="big">₪</div><div class="small">ישראל</div></div>
      <div class="face back"><div class="big">1</div><div class="small">שקל חדש</div></div>
    </div>
  </div>
  <div class="verdict" id="verdict"></div>
  <div class="choices" id="choices">
    <button id="pickKopf">Kopf&nbsp;₪</button>
    <button id="pickZahl">Zahl&nbsp;1</button>
  </div>
  <button class="again hidden" id="againBtn">Schließen</button>
</div>

<div class="facts">
  <div class="fact">
    <div class="val" id="dist">–</div>
    <div class="lbl">Entfernung</div>
  </div>
  <div class="div"></div>
  <div class="fact">
    <div class="val" id="bear">–</div>
    <div class="lbl">Richtung</div>
  </div>
</div>

<div class="status" id="status">Standort wird ermittelt …</div>
<button class="start hidden" id="startBtn">Kompass aktivieren</button>

<script>
(function(){
  // Klagemauer (Kotel), Jerusalem
  const KOTEL = { lat: 31.77655, lon: 35.23422 };

  const $ = id => document.getElementById(id);
  const roseEl=$('rose'), needleEl=$('needle'), compassEl=$('compass');
  const distEl=$('dist'), bearEl=$('bear'), statusEl=$('status'), startBtn=$('startBtn');

  // Gradstriche zeichnen
  (function(){
    const g = document.getElementById('ticks');
    let s='';
    for(let a=0;a<360;a+=10){
      const long = a%90===0, med = a%30===0;
      const r1=96, r2 = long?84 : med?88 : 92;
      const rad=a*Math.PI/180, cx=100, cy=100;
      s+=`<line x1="${cx+r1*Math.sin(rad)}" y1="${cy-r1*Math.cos(rad)}" x2="${cx+r2*Math.sin(rad)}" y2="${cy-r2*Math.cos(rad)}" stroke-width="${long?2:1}"/>`;
    }
    g.innerHTML=s;
  })();

  let bearing=null, distanceKm=null, heading=null, hasCompass=false, wasAligned=false;

  const toRad=d=>d*Math.PI/180, toDeg=r=>r*180/Math.PI;
  const norm=d=>((d%360)+360)%360;

  function haversine(lat1,lon1,lat2,lon2){
    const R=6371, dLat=toRad(lat2-lat1), dLon=toRad(lon2-lon1);
    const a=Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
    return 2*R*Math.asin(Math.sqrt(a));
  }
  function initialBearing(lat1,lon1,lat2,lon2){
    const φ1=toRad(lat1), φ2=toRad(lat2), Δλ=toRad(lon2-lon1);
    const y=Math.sin(Δλ)*Math.cos(φ2);
    const x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
    return norm(toDeg(Math.atan2(y,x)));
  }
  function cardinal(d){
    const dirs=['N','NNO','NO','ONO','O','OSO','SO','SSO','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(d/22.5)%16];
  }
  function fmtDist(km){
    if(km<1) return Math.round(km*1000)+' <em>m</em>';
    if(km<100) return km.toFixed(1).replace('.',',')+' <em>km</em>';
    return Math.round(km).toLocaleString('de-DE')+' <em>km</em>';
  }

  function render(){
    if(bearing===null) return;
    distEl.innerHTML=fmtDist(distanceKm);
    bearEl.innerHTML=Math.round(bearing)+'° <em>'+cardinal(bearing)+'</em>';
  }

  /* ---------- Sanfte Animation (kein Springen an der 0°/360°-Grenze) ---------- */
  // Kürzeste Differenz zweier Winkel (-180..180)
  const angDiff=(a,b)=>((b-a)%360+540)%360-180;
  let dispRose=0, dispNeedle=0;         // fortlaufend, ohne Sprünge
  let alignedSince=null, coinShownThisAlignment=false;

  function tick(){
    if(bearing!==null){
      const h = hasCompass && heading!==null ? heading : 0;
      // Zielwinkel weich anfahren (Tiefpass)
      dispRose   += angDiff(dispRose,   -h)          * 0.18;
      dispNeedle += angDiff(dispNeedle, bearing - h) * 0.18;
      roseEl.style.transform  ='rotate('+dispRose+'deg)';
      needleEl.style.transform='rotate('+dispNeedle+'deg)';

      if(hasCompass && heading!==null){
        let diff=Math.abs(angDiff(heading, bearing));
        const aligned = wasAligned ? diff<=9 : diff<=5;   // Hysterese gegen Flackern
        compassEl.classList.toggle('aligned', aligned);

        if(aligned && !wasAligned){
          if(navigator.vibrate) navigator.vibrate(60);
          statusEl.textContent='Du bist zur Klagemauer ausgerichtet.';
          statusEl.classList.add('gold');
          alignedSince=Date.now();
        } else if(!aligned && wasAligned){
          statusEl.textContent='';
          statusEl.classList.remove('gold');
          alignedSince=null;
        }
        if(!aligned && diff>18) coinShownThisAlignment=false; // erst nach echtem Wegdrehen neu anbieten
        wasAligned=aligned;

        // Nach 1,2 s stabiler Ausrichtung: Münzwurf anbieten
        if(aligned && !coinShownThisAlignment && alignedSince && Date.now()-alignedSince>1200 && !flipping){
          coinShownThisAlignment=true;
          openCoin();
        }
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  /* ---------- Münzwurf ---------- */
  // Strahlenkranz erzeugen
  (function(){
    const b=$('burst'); let s='';
    for(let i=0;i<16;i++) s+='<i style="--a:'+(i*22.5)+'deg"></i>';
    b.innerHTML=s;
  })();

  const coinPanel=$('coinPanel'), coinInner=$('coinInner'), verdict=$('verdict'),
        choices=$('choices'), againBtn=$('againBtn'), coinSub=$('coinSub');
  let flipping=false, coinRot=0;

  function openCoin(){
    verdict.innerHTML='';
    choices.classList.remove('hidden');
    againBtn.classList.add('hidden');
    coinSub.textContent='Stell deine Frage im Stillen – wird es sich erfüllen? Wähle Kopf oder Zahl.';
    coinInner.style.transition='none';
    coinRot=0; coinInner.style.transform='rotateX(0deg)';
    coinPanel.classList.add('show');
    if(navigator.vibrate) navigator.vibrate([40,60,40]);
  }
  function closeCoin(){ coinPanel.classList.remove('show'); }

  function flip(choice){
    if(flipping) return;
    flipping=true;
    choices.classList.add('hidden');
    coinSub.textContent='Die Münze fliegt …';
    const result = Math.random()<0.5 ? 'kopf' : 'zahl';   // kopf = ₪-Seite (0°), zahl = 1-Seite (180°)
    const target = 360*6 + (result==='zahl'?180:0);
    coinRot += target - (coinRot%360);
    coinInner.style.transition='transform 2.6s cubic-bezier(.12,.72,.2,1)';
    requestAnimationFrame(()=>{ coinInner.style.transform='rotateX('+coinRot+'deg)'; });

    setTimeout(()=>{
      const hit = choice===result;
      const resName = result==='kopf' ? 'Kopf' : 'Zahl';
      verdict.innerHTML = hit
        ? '<span class="yes">'+resName+' – die Mauer sagt: Ja.</span>'
        : '<span class="no">'+resName+' – diesmal nicht.</span>';
      coinSub.textContent = hit
        ? 'Deine Wahl hat sich erfüllt.'
        : 'Richte dich neu aus und frag noch einmal.';
      if(navigator.vibrate) navigator.vibrate(hit?[60,80,120]:80);
      againBtn.classList.remove('hidden');
      flipping=false;
    }, 2700);
  }

  $('pickKopf').addEventListener('click',()=>flip('kopf'));
  $('pickZahl').addEventListener('click',()=>flip('zahl'));
  $('coinClose').addEventListener('click',closeCoin);
  againBtn.addEventListener('click',closeCoin);

  // ---------- Standort ----------
  function onPos(p){
    distanceKm = haversine(p.coords.latitude, p.coords.longitude, KOTEL.lat, KOTEL.lon);
    bearing    = initialBearing(p.coords.latitude, p.coords.longitude, KOTEL.lat, KOTEL.lon);
    if(!hasCompass){
      statusEl.textContent='Kein Kompass verfügbar – Karte ist nach Norden ausgerichtet, die Nadel zeigt die Richtung.';
    } else if(!statusEl.classList.contains('gold')){
      statusEl.textContent='Drehe dich, bis die goldene Nadel nach oben zeigt.';
    }
    render();
  }
  function locate(){
    // 1. Versuch: schnell & grob (WLAN/Funkzelle) – reicht für die Richtung völlig
    navigator.geolocation.getCurrentPosition(onPos, function(e){
      if(e.code===1){
        statusEl.textContent='Standortzugriff verweigert. Bitte in den Browser-Einstellungen erlauben und die Seite neu laden.';
        return;
      }
      // 2. Versuch: hohe Genauigkeit (GPS), längeres Zeitfenster
      statusEl.textContent='Suche GPS-Signal …';
      navigator.geolocation.getCurrentPosition(onPos, function(e2){
        statusEl.textContent = e2.code===1
          ? 'Standortzugriff verweigert. Bitte in den Einstellungen erlauben und neu laden.'
          : 'Standort konnte nicht ermittelt werden. Am Fenster oder im Freien erneut versuchen.';
      }, {enableHighAccuracy:true, timeout:20000, maximumAge:0});
    }, {enableHighAccuracy:false, timeout:8000, maximumAge:600000});

    // Laufende Aktualisierung im Hintergrund
    navigator.geolocation.watchPosition(onPos, ()=>{}, {enableHighAccuracy:false, maximumAge:60000});
  }
  if('geolocation' in navigator){
    locate();
  } else {
    statusEl.textContent='Dieses Gerät unterstützt keine Standortermittlung.';
  }

  // ---------- Kompass / Ausrichtung ----------
  let screenAngle=()=> (screen.orientation && screen.orientation.angle) || window.orientation || 0;

  function onOrient(e){
    let h=null;
    if(typeof e.webkitCompassHeading==='number' && !isNaN(e.webkitCompassHeading)){
      h = e.webkitCompassHeading;               // iOS: bereits missweisungsfrei, im Uhrzeigersinn
    } else if(e.absolute===true && e.alpha!==null){
      h = norm(360 - e.alpha + screenAngle());  // Android
    }
    if(h!==null){ hasCompass=true; heading=h; }
  }

  function checkCompassArrived(){
    setTimeout(function(){
      if(!hasCompass){
        statusEl.textContent='Kein Kompass-Sensor gefunden (am Computer normal). Die Nadel zeigt die Richtung bei nach Norden ausgerichteter Rose – Gradzahl siehe unten.';
      }
    }, 4000);
  }

  function startCompass(){
    if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
      // iOS 13+: braucht Nutzergeste
      DeviceOrientationEvent.requestPermission().then(state=>{
        if(state==='granted'){
          window.addEventListener('deviceorientation', onOrient, true);
          checkCompassArrived();
        } else {
          statusEl.textContent='Kompasszugriff verweigert – Richtung wird als Gradzahl angezeigt. Zum Zurücksetzen: Safari-Einstellungen → Datenschutz → Bewegung & Ausrichtung.';
        }
        startBtn.classList.add('hidden');
      }).catch(()=>{ startBtn.classList.add('hidden'); });
    } else {
      if('ondeviceorientationabsolute' in window){
        window.addEventListener('deviceorientationabsolute', onOrient, true);
      }
      window.addEventListener('deviceorientation', onOrient, true);
      startBtn.classList.add('hidden');
      checkCompassArrived();
    }
  }

  // iOS verlangt eine Nutzergeste → Button nur zeigen, wenn nötig
  if(typeof DeviceOrientationEvent!=='undefined' && typeof DeviceOrientationEvent.requestPermission==='function'){
    startBtn.classList.remove('hidden');
    startBtn.addEventListener('click', startCompass);
  } else {
    startCompass();
  }
})();
</script>
</body>
</html>
